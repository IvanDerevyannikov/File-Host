<!DOCTYPE html>
<html lang="en-US"> 
    <head>
        <meta charset="utf-8">
        <title>ERROR 400</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                margin: 0;
                padding: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #f5f5f5;
                font-family: Arial, sans-serif;
            }
            
            .mainError400 {
                text-align: center;
                padding: 2rem;
                max-width: 600px;
            }
            
            .error-code {
                font-size: 4rem;
                font-weight: bold;
                color: #d32f2f;
                margin: 0;
            }
            
            .error-title {
                font-size: 2rem;
                color: #333;
                margin: 0 0 1rem 0;
            }
            
            .error-description {
                font-size: 1.2rem;
                color: #666;
                margin-bottom: 2rem;
            }
            
            .suggestions {
                text-align: left;
                display: inline-block;
                margin-top: 1rem;
            }
            
            .suggestions h2 {
                text-align: center;
                color: #333;
            }
            
            .suggestions ul {
                color: #555;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <div class="mainError400">

            <p class="error-code">400</p>
            

            <h1 class="error-title">Error 400 - Bad Request</h1>
            

            <p class="error-description">
                Server cannot process your request due to incorrect syntax
            </p>
            
   
            <section class="suggestions">
                <h2>Possible reasons:</h2>
                <ul>
                    <li>Incorrect data in the form</li>
                    <li>Corrupted cookies or cache</li>
                    <li>Technical issues on the server side</li>
                    <li>Invalid URL parameters</li>
                    <li>Malformed request syntax</li>
                </ul>
            </section>
        </div>
    </body>
</html>
